<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0818"/>
      <stop offset="60%" stop-color="#060410"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>

    <!-- Nebula clouds -->
    <radialGradient id="nebula-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C41E3A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#C41E3A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula-3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3A86FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3A86FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula-4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06D6A0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06D6A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula-5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFBE0B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFBE0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orb-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nebula-blur">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <style>
      @keyframes twinkle-a { 0%,100%{opacity:0.2} 50%{opacity:1} }
      @keyframes twinkle-b { 0%,100%{opacity:0.5} 50%{opacity:0.1} }
      @keyframes twinkle-c { 0%,100%{opacity:0.8} 30%{opacity:0.2} 70%{opacity:1} }
      @keyframes float-slow { 0%,100%{transform:translate(0,0)} 50%{transform:translate(6px,-8px)} }
      @keyframes float-med  { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-8px,6px)} }
      @keyframes float-fast { 0%,100%{transform:translate(0,0)} 50%{transform:translate(5px,9px)} }
      @keyframes float-rev  { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5px,-7px)} }
      @keyframes nebula-pulse { 0%,100%{opacity:0.8} 50%{opacity:1.0} }
      @keyframes orb-drift { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(10px,-12px) scale(1.08)} }
      @keyframes orb-drift-2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-12px,8px) scale(0.95)} }

      .tw-a { animation: twinkle-a 2.5s ease-in-out infinite }
      .tw-b { animation: twinkle-b 3.8s ease-in-out infinite }
      .tw-c { animation: twinkle-c 1.9s ease-in-out infinite }
      .tw-d { animation: twinkle-a 4.2s ease-in-out infinite 0.8s }
      .tw-e { animation: twinkle-b 2.1s ease-in-out infinite 1.2s }
      .tw-f { animation: twinkle-c 3.3s ease-in-out infinite 0.4s }
      .tw-g { animation: twinkle-a 1.7s ease-in-out infinite 1.8s }
      .tw-h { animation: twinkle-b 4.8s ease-in-out infinite 0.2s }

      .fl-s { animation: float-slow 9s ease-in-out infinite }
      .fl-m { animation: float-med 7s ease-in-out infinite }
      .fl-f { animation: float-fast 5s ease-in-out infinite }
      .fl-r { animation: float-rev 8s ease-in-out infinite }
      .fl-r2 { animation: float-rev 11s ease-in-out infinite 1s }

      .nb-p { animation: nebula-pulse 6s ease-in-out infinite }
      .orb-d1 { animation: orb-drift 12s ease-in-out infinite }
      .orb-d2 { animation: orb-drift-2 10s ease-in-out infinite }
    </style>
  </defs>

  <!-- Base background -->
  <rect width="900" height="280" fill="url(#space-bg)"/>

  <!-- Nebula clouds (blurred, layered) -->
  <g filter="url(#nebula-blur)" class="nb-p">
    <ellipse cx="180" cy="100" rx="200" ry="120" fill="url(#nebula-1)"/>
    <ellipse cx="750" cy="160" rx="180" ry="110" fill="url(#nebula-1)"/>
  </g>
  <g filter="url(#nebula-blur)">
    <ellipse cx="120" cy="200" rx="160" ry="90" fill="url(#nebula-2)"/>
    <ellipse cx="820" cy="60" rx="140" ry="80" fill="url(#nebula-2)"/>
  </g>
  <g filter="url(#nebula-blur)" class="nb-p">
    <ellipse cx="450" cy="140" rx="220" ry="130" fill="url(#nebula-3)"/>
  </g>
  <g filter="url(#nebula-blur)">
    <ellipse cx="300" cy="220" rx="150" ry="80" fill="url(#nebula-4)"/>
    <ellipse cx="650" cy="50" rx="170" ry="90" fill="url(#nebula-5)"/>
  </g>

  <!-- Distant tiny stars (static white) -->
  <g fill="#ffffff">
    <circle cx="42" cy="18" r="0.6" opacity="0.6"/>
    <circle cx="87" cy="52" r="0.5" opacity="0.5"/>
    <circle cx="134" cy="23" r="0.7" opacity="0.7"/>
    <circle cx="198" cy="67" r="0.5" opacity="0.4"/>
    <circle cx="223" cy="11" r="0.6" opacity="0.6"/>
    <circle cx="267" cy="44" r="0.8" opacity="0.5"/>
    <circle cx="312" cy="19" r="0.5" opacity="0.7"/>
    <circle cx="358" cy="71" r="0.6" opacity="0.4"/>
    <circle cx="401" cy="28" r="0.7" opacity="0.6"/>
    <circle cx="445" cy="55" r="0.5" opacity="0.5"/>
    <circle cx="489" cy="14" r="0.6" opacity="0.7"/>
    <circle cx="534" cy="38" r="0.8" opacity="0.4"/>
    <circle cx="578" cy="22" r="0.5" opacity="0.6"/>
    <circle cx="623" cy="61" r="0.6" opacity="0.5"/>
    <circle cx="668" cy="17" r="0.7" opacity="0.7"/>
    <circle cx="712" cy="48" r="0.5" opacity="0.4"/>
    <circle cx="756" cy="25" r="0.6" opacity="0.6"/>
    <circle cx="801" cy="58" r="0.8" opacity="0.5"/>
    <circle cx="845" cy="19" r="0.5" opacity="0.7"/>
    <circle cx="889" cy="43" r="0.6" opacity="0.4"/>
    <!-- mid row -->
    <circle cx="65" cy="130" r="0.5" opacity="0.5"/>
    <circle cx="110" cy="155" r="0.6" opacity="0.6"/>
    <circle cx="165" cy="118" r="0.7" opacity="0.4"/>
    <circle cx="245" cy="142" r="0.5" opacity="0.5"/>
    <circle cx="320" cy="108" r="0.6" opacity="0.7"/>
    <circle cx="388" cy="160" r="0.5" opacity="0.4"/>
    <circle cx="470" cy="125" r="0.7" opacity="0.6"/>
    <circle cx="545" cy="148" r="0.5" opacity="0.5"/>
    <circle cx="610" cy="112" r="0.6" opacity="0.7"/>
    <circle cx="685" cy="138" r="0.8" opacity="0.4"/>
    <circle cx="748" cy="105" r="0.5" opacity="0.6"/>
    <circle cx="815" cy="145" r="0.6" opacity="0.5"/>
    <circle cx="872" cy="120" r="0.7" opacity="0.7"/>
    <!-- bottom row -->
    <circle cx="55" cy="230" r="0.6" opacity="0.4"/>
    <circle cx="118" cy="258" r="0.5" opacity="0.5"/>
    <circle cx="188" cy="240" r="0.7" opacity="0.6"/>
    <circle cx="258" cy="268" r="0.5" opacity="0.4"/>
    <circle cx="335" cy="225" r="0.6" opacity="0.5"/>
    <circle cx="412" cy="252" r="0.8" opacity="0.7"/>
    <circle cx="488" cy="238" r="0.5" opacity="0.4"/>
    <circle cx="558" cy="265" r="0.6" opacity="0.6"/>
    <circle cx="632" cy="228" r="0.7" opacity="0.5"/>
    <circle cx="702" cy="255" r="0.5" opacity="0.7"/>
    <circle cx="768" cy="240" r="0.6" opacity="0.4"/>
    <circle cx="838" cy="262" r="0.5" opacity="0.5"/>
    <circle cx="888" cy="235" r="0.7" opacity="0.6"/>
  </g>

  <!-- Twinkling medium stars -->
  <circle class="tw-a" cx="78" cy="88" r="1.2" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-b" cx="156" cy="44" r="1.5" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-c" cx="234" cy="98" r="1.1" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-d" cx="345" cy="32" r="1.4" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-e" cx="423" cy="88" r="1.2" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-f" cx="512" cy="45" r="1.5" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-g" cx="598" cy="78" r="1.1" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-h" cx="678" cy="35" r="1.4" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-a" cx="762" cy="88" r="1.2" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-b" cx="845" cy="42" r="1.5" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-c" cx="92" cy="195" r="1.1" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-d" cx="188" cy="215" r="1.4" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-e" cx="298" cy="188" r="1.2" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-f" cx="398" cy="220" r="1.1" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-g" cx="502" cy="198" r="1.5" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-h" cx="608" cy="210" r="1.2" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-a" cx="715" cy="192" r="1.4" fill="#ffffff" filter="url(#star-glow)"/>
  <circle class="tw-b" cx="818" cy="208" r="1.1" fill="#ffffff" filter="url(#star-glow)"/>

  <!-- Twinkling colored stars -->
  <circle class="tw-c fl-s" cx="145" cy="165" r="1.5" fill="#A78BFA" filter="url(#star-glow)"/>
  <circle class="tw-a fl-m" cx="288" cy="128" r="1.3" fill="#C41E3A" filter="url(#star-glow)"/>
  <circle class="tw-b fl-f" cx="432" cy="172" r="1.4" fill="#06D6A0" filter="url(#star-glow)"/>
  <circle class="tw-d fl-r" cx="568" cy="135" r="1.5" fill="#FFBE0B" filter="url(#star-glow)"/>
  <circle class="tw-e fl-s" cx="712" cy="168" r="1.3" fill="#3A86FF" filter="url(#star-glow)"/>
  <circle class="tw-f fl-m" cx="855" cy="148" r="1.4" fill="#FF006E" filter="url(#star-glow)"/>
  <circle class="tw-g fl-r2" cx="62" cy="155" r="1.2" fill="#FFBE0B" filter="url(#star-glow)"/>
  <circle class="tw-h fl-f" cx="370" cy="62" r="1.5" fill="#A78BFA" filter="url(#star-glow)"/>
  <circle class="tw-a fl-r" cx="640" cy="258" r="1.3" fill="#06D6A0" filter="url(#star-glow)"/>
  <circle class="tw-b fl-s" cx="488" cy="248" r="1.4" fill="#C41E3A" filter="url(#star-glow)"/>

  <!-- Large glowing orbs (floating) -->
  <circle class="orb-d1" cx="160" cy="130" r="22" fill="#A78BFA" opacity="0.04" filter="url(#orb-glow)"/>
  <circle class="orb-d1" cx="160" cy="130" r="10" fill="#A78BFA" opacity="0.08" filter="url(#orb-glow)"/>
  <circle class="orb-d1" cx="160" cy="130" r="3.5" fill="#A78BFA" opacity="0.6" filter="url(#star-glow)"/>

  <circle class="orb-d2" cx="450" cy="140" r="28" fill="#3A86FF" opacity="0.04" filter="url(#orb-glow)"/>
  <circle class="orb-d2" cx="450" cy="140" r="12" fill="#3A86FF" opacity="0.07" filter="url(#orb-glow)"/>
  <circle class="orb-d2" cx="450" cy="140" r="3" fill="#3A86FF" opacity="0.7" filter="url(#star-glow)"/>

  <circle class="orb-d1" cx="760" cy="110" r="20" fill="#06D6A0" opacity="0.04" filter="url(#orb-glow)"/>
  <circle class="orb-d1" cx="760" cy="110" r="9" fill="#06D6A0" opacity="0.08" filter="url(#orb-glow)"/>
  <circle class="orb-d1" cx="760" cy="110" r="3" fill="#06D6A0" opacity="0.6" filter="url(#star-glow)"/>

  <circle class="orb-d2" cx="310" cy="220" r="18" fill="#C41E3A" opacity="0.05" filter="url(#orb-glow)"/>
  <circle class="orb-d2" cx="310" cy="220" r="8" fill="#C41E3A" opacity="0.09" filter="url(#orb-glow)"/>
  <circle class="orb-d2" cx="310" cy="220" r="2.5" fill="#C41E3A" opacity="0.7" filter="url(#star-glow)"/>

  <circle class="orb-d1" cx="620" cy="230" r="16" fill="#FFBE0B" opacity="0.04" filter="url(#orb-glow)"/>
  <circle class="orb-d1" cx="620" cy="230" r="7" fill="#FFBE0B" opacity="0.08" filter="url(#orb-glow)"/>
  <circle class="orb-d1" cx="620" cy="230" r="2.5" fill="#FFBE0B" opacity="0.6" filter="url(#star-glow)"/>

  <!-- Shooting star streak -->
  <line x1="600" y1="30" x2="680" y2="50" stroke="white" stroke-width="0.6" opacity="0.15"/>
  <line x1="200" y1="250" x2="270" y2="265" stroke="white" stroke-width="0.5" opacity="0.12"/>

  <!-- Bottom fade to black -->
  <defs>
    <linearGradient id="bottom-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="70%" stop-color="#020208" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="280" fill="url(#bottom-fade)"/>
</svg>
