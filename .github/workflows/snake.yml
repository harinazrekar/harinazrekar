name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: harinazrekar
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy to output branch
        run: |
          cd dist
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b output
          git add .
          git commit -m "update snake"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/harinazrekar/harinazrekar.git output
